<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Graph edges (left side) -->
  <g stroke="url(#edge)" stroke-width="2" fill="none" filter="url(#glow)">
    <line x1="130" y1="100" x2="60" y2="50"/>
    <line x1="130" y1="100" x2="200" y2="50"/>
    <line x1="130" y1="100" x2="45" y2="110"/>
    <line x1="130" y1="100" x2="215" y2="110"/>
    <line x1="130" y1="100" x2="70" y2="160"/>
    <line x1="130" y1="100" x2="190" y2="160"/>
    <line x1="60" y1="50" x2="45" y2="110"/>
    <line x1="200" y1="50" x2="215" y2="110"/>
    <line x1="45" y1="110" x2="70" y2="160"/>
    <line x1="215" y1="110" x2="190" y2="160"/>
    <line x1="60" y1="50" x2="200" y2="50"/>
    <line x1="70" y1="160" x2="190" y2="160"/>
  </g>

  <!-- Graph nodes -->
  <g filter="url(#glow)">
    <circle cx="130" cy="100" r="14" fill="url(#accent)"/>
    <circle cx="60" cy="50" r="8" fill="#38bdf8"/>
    <circle cx="200" cy="50" r="8" fill="#818cf8"/>
    <circle cx="45" cy="110" r="7" fill="#38bdf8"/>
    <circle cx="215" cy="110" r="7" fill="#818cf8"/>
    <circle cx="70" cy="160" r="7" fill="#38bdf8"/>
    <circle cx="190" cy="160" r="7" fill="#818cf8"/>
  </g>

  <!-- Code bracket on center node -->
  <text x="119" y="106" font-family="monospace" font-size="16" font-weight="bold" fill="#0f172a">&lt;/&gt;</text>

  <!-- Title -->
  <text x="340" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" letter-spacing="2" fill="white">ArchGraph</text>

  <!-- Subtitle -->
  <text x="342" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="400" letter-spacing="1.5" fill="#94a3b8">Source code knowledge graph for reverse engineering</text>

  <!-- Badge-like pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">
    <rect x="342" y="148" width="82" height="22" rx="11" fill="#38bdf820" stroke="#38bdf8" stroke-width="1"/>
    <text x="383" y="163" text-anchor="middle" fill="#38bdf8">10 Languages</text>

    <rect x="434" y="148" width="68" height="22" rx="11" fill="#818cf820" stroke="#818cf8" stroke-width="1"/>
    <text x="468" y="163" text-anchor="middle" fill="#818cf8">Neo4j</text>

    <rect x="512" y="148" width="90" height="22" rx="11" fill="#38bdf820" stroke="#38bdf8" stroke-width="1"/>
    <text x="557" y="163" text-anchor="middle" fill="#38bdf8">Taint Analysis</text>

    <rect x="612" y="148" width="53" height="22" rx="11" fill="#818cf820" stroke="#818cf8" stroke-width="1"/>
    <text x="638" y="163" text-anchor="middle" fill="#818cf8">CVE</text>
  </g>
</svg>
